<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>

    <script src="https://pl29259699.profitablecpmratenetwork.com/3f/ea/cd/3feacdf523277dc72ce01f060ebf455c.js"></script>

    <script src="https://pl29259700.profitablecpmratenetwork.com/48/39/72/483972e08152671cfa903e7f75e6646d.js"></script>

    <style>
        /* Background Hitam Total */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* TOMBOL PLAY PINK SENSASIONAL */
        .play-button {
            width: 90px; height: 90px;
            background: #FF1493; /* Warna Pink */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.5);
            transition: transform 0.1s ease;
            z-index: 10;
        }

        .play-icon {
            width: 0; height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-left: 32px solid white;
            margin-left: 10px;
        }

        .play-button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="video-wrapper" onclick="eksekusiCuan()">
        <div class="play-button">
            <div class="play-icon"></div>
        </div>
    </div>

    <script>
        function eksekusiCuan() {
            // IKLAN (TAB BARU)
            window.open("https://www.profitablecpmratenetwork.com/c3757quzd?key=5ffae522f4a3b7088a9676441df91beb", "_blank");

            // KE VIDEO ASLI (TAB SEKARANG)
            setTimeout(function(){
                window.location.href = "https://cdn2.slicedrive.com/I0ux9fz21.mp4"; 
            }, 800); 
        }

        // ANTI-BACK SCRIPT
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            window.location.href = "https://www.profitablecpmratenetwork.com/c3757quzd?key=5ffae522f4a3b7088a9676441df91beb";
        };
    </script>

</body>
</html>
